version: '3.8'
services:
  db:
    image: postgres:15
    container_name: blog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blog_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://bloguser:blogpass@db:5432/blogdb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
